# Generates the per-language bindings for the contracts workspace (ADR 0044).
# Go now (protobuf messages + Connect service stubs) into the published gen/
# path; TypeScript (protoc-gen-es) and native clients land in later slices.
version: v2
plugins:
  - local: protoc-gen-go
    out: gen
    opt: paths=source_relative
  - local: protoc-gen-connect-go
    out: gen
    opt: paths=source_relative
  - local: ["npx", "protoc-gen-es"]
    out: gen-ts
    opt:
      - target=ts
      - import_extension=none

# buf workspace for the Mosaic contracts (ADR 0044). Four packages under proto/:
# the SDUI content contract (mosaic/sdui/v1); the session transport contract
# (mosaic/session/v1), which imports the former so a UINode rides typed; the
# auth service (mosaic/auth/v1), separate because it is the one call made
# without a session (ADR 0061); and the extension module boundary
# (mosaic/module/v1), the wire an out-of-process module speaks (ADR 0064,
# ADR 0077).
version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  except:
    # ADR 0041 names the session contract deliberately: a shared empty Ack reply
    # for every intent, an Op enum whose zero value REPLACE is the whole-region
    # default, and a ServerMessage streamed by Subscribe. These honour the ADR's
    # shape over buf's naming conventions.
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
    - ENUM_VALUE_PREFIX
    - ENUM_ZERO_VALUE_SUFFIX
breaking:
  use:
    - FILE
